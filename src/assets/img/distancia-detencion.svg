<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" role="img" aria-label="Distancia de detención igual a distancia de reacción más distancia de frenado">
  <!-- Corchete superior: distancia total -->
  <path d="M60 34 V24 H420 V34" fill="none" stroke="#b4bac1" stroke-width="2"/>
  <text x="240" y="18" text-anchor="middle" font-family="'DM Sans', Arial, sans-serif" font-size="14" font-weight="800" fill="#f5f6f7">DISTANCIA DE DETENCIÓN (S)</text>

  <!-- Moto (icono simple) -->
  <g transform="translate(20,96)" stroke="#f5f6f7" stroke-width="2.5" fill="none">
    <circle cx="4" cy="14" r="9"/>
    <circle cx="30" cy="14" r="9"/>
    <path d="M4 14 L15 4 L24 4 M15 4 L22 14 M24 4 L30 14" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Segmento reacción -->
  <rect x="60" y="96" width="150" height="26" rx="5" fill="#f5a623"/>
  <text x="135" y="114" text-anchor="middle" font-family="'DM Sans', Arial, sans-serif" font-size="13" font-weight="700" fill="#101214">Reacción (R)</text>

  <!-- Segmento frenado -->
  <rect x="212" y="96" width="208" height="26" rx="5" fill="#e5322d"/>
  <text x="316" y="114" text-anchor="middle" font-family="'DM Sans', Arial, sans-serif" font-size="13" font-weight="700" fill="#ffffff">Frenado (F)</text>

  <!-- Línea de suelo -->
  <line x1="12" y1="132" x2="440" y2="132" stroke="#3a3e43" stroke-width="2"/>

  <!-- Fórmula -->
  <text x="240" y="162" text-anchor="middle" font-family="'DM Sans', Arial, sans-serif" font-size="15" font-weight="800" fill="#f5f6f7">S = R + F</text>
  <text x="240" y="184" text-anchor="middle" font-family="'DM Sans', Arial, sans-serif" font-size="11" fill="#b4bac1">La distancia de frenado crece con el cuadrado de la velocidad</text>
</svg>
