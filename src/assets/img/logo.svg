<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 150" role="img" aria-label="Conducir Motos - Desde 2008 patentando pilotos">
  <!-- Patente -->
  <rect x="5" y="5" width="230" height="140" rx="16" fill="#f4f3ee" stroke="#111111" stroke-width="6"/>
  <!-- Tornillos -->
  <circle cx="28" cy="26" r="4" fill="#8a8a8a"/>
  <circle cx="212" cy="26" r="4" fill="#8a8a8a"/>
  <!-- CHILE + estrella -->
  <text x="120" y="30" text-anchor="middle" font-family="'DM Sans', Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="7" fill="#111111">CHILE</text>
  <text x="120" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#111111">★</text>
  <!-- CONDUCIR MOTOS -->
  <text x="120" y="82" text-anchor="middle" font-family="'DM Sans', Arial, sans-serif" font-size="30" font-weight="800" letter-spacing="1" fill="#111111">CONDUCIR</text>
  <text x="120" y="110" text-anchor="middle" font-family="'DM Sans', Arial, sans-serif" font-size="27" font-weight="800" letter-spacing="1" fill="#111111">MOTOS</text>
  <!-- Bajada -->
  <text x="120" y="127" text-anchor="middle" font-family="'DM Sans', Arial, sans-serif" font-size="10" font-weight="700" letter-spacing="1.5" fill="#111111">DESDE 2008</text>
  <text x="120" y="139" text-anchor="middle" font-family="'DM Sans', Arial, sans-serif" font-size="9" font-weight="700" letter-spacing="1.5" fill="#111111">PATENTANDO PILOTOS</text>
  <!-- Sello Universidad de Libertad -->
  <g transform="translate(206,40)">
    <circle r="27" fill="#14213d" stroke="#c9a227" stroke-width="2.5"/>
    <circle r="21" fill="none" stroke="#c9a227" stroke-width="1"/>
    <path id="arcoTop" d="M -15,-2 A 15 15 0 0 1 15,-2" fill="none"/>
    <path id="arcoBot" d="M -16,2 A 16 16 0 0 0 16,2" fill="none"/>
    <text font-family="'DM Sans', Arial, sans-serif" font-size="5" font-weight="700" letter-spacing="0.5" fill="#c9a227">
      <textPath href="#arcoTop" startOffset="50%" text-anchor="middle">UNIVERSIDAD</textPath>
    </text>
    <text font-family="'DM Sans', Arial, sans-serif" font-size="5" font-weight="700" letter-spacing="0.5" fill="#c9a227">
      <textPath href="#arcoBot" startOffset="50%" text-anchor="middle">DE LIBERTAD</textPath>
    </text>
    <text x="0" y="5" text-anchor="middle" font-family="'DM Sans', Arial, sans-serif" font-size="13" font-weight="800" letter-spacing="0.5" fill="#c9a227">UL</text>
    <text x="0" y="-8" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#c9a227">★</text>
  </g>
</svg>
